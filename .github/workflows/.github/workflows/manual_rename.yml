name: "إعادة تسمية الصور سحابياً"

on:
  workflow_dispatch: # هذا السطر يتيح لك تشغيله يدوياً من قسم Actions

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: "تنفيذ سكريبت التسمية"
        run: python automation/cloud_rename.py
        
      - name: "حفظ التغييرات وإرسالها"
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add assets/images/
          git commit -m "مَيْكَنَةُ أَسْمَاءِ الصُّوَرِ لِتُطَابِقَ المَقَالَاتِ" || echo "لا توجد تغييرات"
          git push
