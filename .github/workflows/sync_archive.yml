name: Blogger Archive Sync

on:
  schedule:
    - cron: '0 0 * * *' # يعمل تلقائياً كل يوم في منتصف الليل
  workflow_dispatch:      # يسمح لك بتشغيله يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install feedparser PyGithub

      - name: Run Sync Script
        env:
          GH_TOKEN: ${{ secrets.ARCHIVE_ACCESS_TOKEN }} # استدعاء المفتاح من الخزنة الآمنة
        run: python automation/sync_blogger.py
