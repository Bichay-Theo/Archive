name: "تَطْهِيرُ الأَرْشِيفِ وَتَصْحِيحُ الرَّوَابِطِ"

on:
  workflow_dispatch: # هـذا السـطـر هـو مـِفـتـاحُ الـتـَّشـغـِيـلِ الـيـَدَوِي

permissions:
  contents: write # مـَنـحُ الـنـِّظـامِ صـَلـاحـِيـَّةَ الـتـَّعـدِيـلِ فـِي الـمـَسـارات

jobs:
  fix-and-standardize:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: "اسْتِدْعَاءُ الكُودِ"
        uses: actions/checkout@v4
      
      - name: "تَهْيِئَةُ بـِـيـئـَةِ بـايـثـُون"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "تَنْفِيذُ سِكْرِيپْتِ التَّصْحِيحِ"
        run: python automation/fix_names.py
        
      - name: "حَفْظُ التَّغْيِيرَاتِ وَإِرْسَالُهَا لِلْقَلْعَةِ"
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "تَصْحِيحُ الأَسْمَاءِ: تَعْمِيدُ الرَّوَابِطِ لِتَكُونَ لَاتِينِيَّةً [حَسْمُ مَشَاكِلِ 404]" || echo "لا توجد تغييرات"
          git push
