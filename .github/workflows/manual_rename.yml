name: "إعادة تسمية الصور سحابياً"

on:
  workflow_dispatch:

permissions:
  contents: write  # هـذا السـطـر يـحـل مـشـكـلـة الـخـطـأ 128

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: "تهيئة بيئة بايثون"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "تنفيذ سكريبت التسمية"
        run: python automation/cloud_rename.py
        
      - name: "حفظ التغييرات وإرسالها"
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add assets/images/ || echo "No images to add"
          git commit -m "مَيْكَنَةُ أَسْمَاءِ الصُّوَرِ [بصلاحيات الكتابة]" || echo "لا توجد تغييرات"
          git push
